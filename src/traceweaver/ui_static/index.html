<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>TraceWeaver</title>
    <script>
      // System theme bootstrap before paint so we never flash the wrong scheme.
      // Source: docs/plan/12_ux_ui_design.md §3.1 Codex round 2 patch P2.
      (function () {
        try {
          const saved = localStorage.getItem("tw-theme");
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const dark = saved === "dark" || (saved !== "light" && prefersDark);
          if (dark) document.documentElement.classList.add("dark");
        } catch {}
      })();
    </script>
    <script type="module" crossorigin src="/assets/index-Bn-lPNIf.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DzysYIpL.css">
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="root"></div>
  </body>
</html>
