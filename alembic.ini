[alembic]
# Migration scripts live with the package they describe so they ship
# inside the wheel automatically (see [tool.hatch.build.targets.wheel]
# in pyproject.toml).
script_location = src/traceweaver/store/migrations

# Allow ``alembic`` to import ``traceweaver.store.*`` without an extra
# PYTHONPATH dance.
prepend_sys_path = src

# The URL is overridden at runtime by env.py via traceweaver.store.engine.
# Setting an empty value here keeps offline ``--sql`` mode happy and
# avoids accidental writes against an unintended DB.
sqlalchemy.url =

# Naming pattern for new revisions: ``<rev>_<slug>.py``.
file_template = %%(rev)s_%%(slug)s

timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
